# Default values for xnat.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
mail:
  existingSecret: postfix-password
  config:
    general:
      ALLOWED_SENDER_DOMAINS: "xnat.org"
      RELAYHOST: "smtp.myrelay.net:587"
      RELAYHOST_USERNAME: apikey
      #RELAYHOST_PASSWORD: ${RELAYHOST_PASSWORD}
      MASQUERADED_DOMAINS: "xnat.org"

# In order to use the following activemq section you must install the Ark-MQ broker found at
# https://github.com/arkmq-org/activemq-artemis-operator/blob/main/docs/getting-started/quick-start.md
# You must set one of either broker.password or existingSecret
activemq:
  broker:
    enabled: false
    user: admin
    password: "admin"
    port: 62626
    # Passed directly to the broker. See the official documentation for arguments that can be placed here.
    deploymentPlan:
      requireLogin: true

  existingSecret:
    name: ""
    key: ""

replicaCount: 1

image:
  repository: xnatworks/xnat-web
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.9.2.1"
imagePullPolicy: IfNotPresent

imagePullSecrets: null

nameOverride: ""
fullnameOverride: ""

redis:
  enabled: true
  pullPolicy: IfNotPresent
  master:
    masterCount: 1
    persistence:
      enabled: false
  replica:
    replicaCount: 0
    persistence:
      enabled: false

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# fsGroup makes the kubelet chown mounted volumes to this GID so the non-root
# tomcat user (1000) can write to dynamically provisioned PVCs; OnRootMismatch
# skips the recursive walk once the top-level GID already matches. Without it,
# gp3/EFS volumes mount root:root and XNAT can't create its prearchive lock
# tree, so DICOM imports fail with a misleading "unable to read DICOM object".
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# Applied to the main xnat (Tomcat) container. XNAT needs no Linux
# capabilities, so drop them all. readOnlyRootFilesystem is intentionally left
# off: XNAT writes under /usr/local/tomcat and /data/xnat at runtime.
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  # readOnlyRootFilesystem: true

service:
  port: 80
  type: ClusterIP

ingress:
  enabled: false
  annotations: {}
