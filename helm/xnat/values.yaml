  #  accessMode: ReadWriteOnce
  #  mountPath: "/data/xnat/cache"
  #  storageClass: "xnatcache"
  #  size: 10Gi


# when using an NFS server securityContext.runAsUser and podSecurityContext.fsGroup
# must be set to align with the UID and GID expected by the share on the NFS server
nfs:
  server:
  pathPrefix: ""
  mountOptions: []

volumes:
  xnatdata:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat"
    storageClass: "default"
    size: 100Gi
  build:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat/build"
    storageClass: "default"
    size: 100Gi
  cache:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat/cache"
    storageClass: "default"
    size: 1Ti
  archive:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat/archive"
    storageClass: "default"
    size: 100Gi
  prearchive:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat/prearchive"
    storageClass: "default"
    size: 1Ti

# Any extra volumes can be defined here and will be inserted into the chart as written
extraVolumes: []
extraVolumeMounts: []

#Extra init containers can be defined here
initContainers: []

# Extra lines can be added to the config secret 
extraConfig: []
# "key": "value"

# Setting to false will prevent creation of the config secret.
# A secret with the contents of xnat-conf.properties named the same as the release name will need to be created manually.
createConfigSecret: true

plugins: []
  # container-service:
  #  repository: radiologicsit/container-service
  #  tag: "3.3.0"
containerService: false
namespace: ""
authplugins: []

# DICOM C-STORE Service Class Provider (SCP)
# DICOM Application Entity (AE)
dicom_scp:
  serviceType: "NodePort"
  annotations: {}
  #  metallb.universe.tf/address-pool: production-public-ips
  #  metallb.universe.tf/allow-shared-ip: true
  recievers:
    - ae_title: "XNAT"
      port: 8104
      # nodePort: 32514
      # loadBalancerIp: "130.95.27.91"

cnpg:
  cluster:
    affinity: {}
    enabled: true # Set to false to use your own DB
    name: "" # Defaults to "{release-name}-postgres"
    instances: 1
    version: 15
    storage:
      size: "50Gi"
      storageClass: "default"
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 16
        memory: "32Gi"
    tolerations: {}
    nodeSelector: {}
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      standard_conforming_strings: "off"
    enableSuperuserAccess: true
    credentials:
      # When set, the XNAT JDBC datasource password is sourced from this
      # existing Secret at runtime (an init container reads it via env and
      # writes it into xnat-conf.properties), so the password never appears in
      # the chart-rendered config Secret. Point it at an ESO-managed Secret, or
      # the CNPG-managed app-credentials Secret. Leave null to use the inline
      # `password` below (dev/quickstart). Also used to bootstrap the bundled
      # CNPG cluster when cnpg.cluster.enabled.
      externalSecret: null
      # Key holding the password within externalSecret (CNPG basic-auth uses
      # "password"; override for an ESO Secret with a different key).
      externalSecretPasswordKey: password
      database: "xnat-web"
      username: "xnat-web"
      password: "xnat-web"
    # CNPG can include roles and services in cluster definitions.
    # See the official docs for more information
    # https://cloudnative-pg.io/docs/1.29/cloudnative-pg.v1#managedconfiguration
    managed: {}  
  external:
    # Set only one of PostgresqlUri or postgresqlIp
    postgresqlUri: null
    postgresqlIp: null
    postgresqlPort: null

# TCP-socket probes against the http (8080) port; see statefulset.yaml for why
# a socket check rather than an HTTP GET on a version-specific health path.
probes:
  startup:
    # XNAT boots slowly (plugin scan + Hibernate schema migration). 60 * 10s =
    # 10 min of grace before liveness can fire; raise for plugin-heavy sites.
    failureThreshold: 60
    periodSeconds: 10
    timeoutSeconds: 5
  liveness:
    failureThreshold: 12
    periodSeconds: 60
    timeoutSeconds: 10
  readiness:
    failureThreshold: 10
    periodSeconds: 30
    timeoutSeconds: 10
restore: false
backups:
  backupStorageAccount:
  dbdmstoken:
  arcdmstoken:
#Used for any variables that change between cloud services
serviceProvider:
 name:
#  backupMount: archive
