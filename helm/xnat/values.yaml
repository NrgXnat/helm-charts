  #  size: 10Gi


# when using an NFS server securityContext.runAsUser and podSecurityContext.fsGroup
# must be set to align with the UID and GID expected by the share on the NFS server
nfs:
  server:
  pathPrefix: ""
  mountOptions: []

volumes:
  xnatdata:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat"
    storageClass: "default"
    size: 100Gi
  build:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat/build"
    storageClass: "default"
    size: 100Gi
  cache:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat/cache"
    storageClass: "default"
    size: 1Ti
  archive:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat/archive"
    storageClass: "default"
    size: 100Gi
  prearchive:
    nfs: false
    hostVolume: false
    existingClaim:
    accessMode: ReadWriteMany
    mountPath: "/data/xnat/prearchive"
    storageClass: "default"
    size: 1Ti

# Any extra volumes can be defined here and will be inserted into the chart as written
extraVolumes: []
extraVolumeMounts: []

#Extra init containers can be defined here
initContainers: []

# Extra lines can be added to the config secret 
extraConfig: {}
# "key": "value"

# Setting to false will prevent creation of the config secret.
# A secret with the contents of xnat-conf.properties named the same as the release name will need to be created manually.
createConfigSecret: true

# Unified plugin declaration: each entry is IMAGE form (backward compat),
# SOURCE form (url|coordinates|file, via the plugin-installer init container),
# or S3 form (a pre-staged JAR copied with the AWS CLI). All render from this
# one map; pick per plugin.
plugins: []
  # Image form — pre-built plugin OCI image (its entrypoint copies the JAR in):
  # container-service:
  #  repository: radiologicsit/container-service
  #  tag: "3.3.0"
  # Source form — pull a raw JAR via the plugin-installer init container:
  # container-service:
  #  source: coordinates        # url | coordinates | file | s3
  #  coordinates: org.nrg.xnatx.plugins:container-service:3.8.1:jar:fat  # mvn -Dartifact
  #  url: https://.../foo.jar   # for source: url
  #  file: /mnt/foo/bar.jar     # for source: file
  #  target: ""                 # output filename in the plugins dir; default <name>.jar
  # S3 form — `aws s3 cp` a pre-staged JAR using the pod's IRSA role (no installer image):
  # container-service:
  #  source: s3
  #  s3Uri: s3://bucket/key.jar # optional; default s3://<pluginInstaller.s3.bucket>/<prefix>/<target>
  #  target: ""                 # output filename; default <name>.jar
# Init-container image that installs source-form (url|coordinates|file) plugins
# above (the xnat-plugin-installer). Required only when a plugins entry sets
# `source` to one of those; the deployer supplies the image ref (not defaulted).
pluginInstaller:
  image: ""
  # S3 plugin install via `aws s3 cp` (no custom image) using the pod's IRSA
  # role -- set serviceAccount.annotations."eks.amazonaws.com/role-arn".
  # `image` is a stock AWS CLI image (pin a tag in production). Two modes:
  #   - per-plugin: a plugins entry with `source: s3` (URI defaults to
  #     s3://<bucket>/<prefix>/<target>, or per-plugin s3Uri).
  #   - syncPrefix: true -> ONE init container copies the whole
  #     s3://<bucket>/<prefix>/ tree into the plugins dir. The plugin set is
  #     whatever is staged there -- no per-plugin list (leave plugins: []).
  s3:
    image: public.ecr.aws/aws-cli/aws-cli:latest
    bucket: ""
    prefix: ""
    region: ""
    syncPrefix: false
containerService: false
namespace: ""
authplugins: []

# DICOM C-STORE Service Class Provider (SCP)
# DICOM Application Entity (AE)
dicom_scp:
  serviceType: "NodePort"
  annotations: {}
  #  metallb.universe.tf/address-pool: production-public-ips
  #  metallb.universe.tf/allow-shared-ip: true
  recievers:
    - ae_title: "XNAT"
      port: 8104
      # nodePort: 32514
      # loadBalancerIp: "130.95.27.91"

cnpg:
  cluster:
    affinity: {}
    enabled: true # Set to false to use your own DB
    name: "" # Defaults to "{release-name}-postgres"
    instances: 1
    # Pin a patch tag for reproducible builds. PG16+ is fine for new installs,
    # but bumping the major on an existing cluster forces a major upgrade.
    version: "15.7"
    storage:
      size: "50Gi"
      storageClass: "default"
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 16
        memory: "32Gi"
    tolerations: []
    nodeSelector: {}
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      standard_conforming_strings: "off"
    # Applications don't need a postgres superuser secret exposed.
    enableSuperuserAccess: false
    credentials:
      # Always use an external secret for production deployments.
      externalSecret: null
      database: "xnat-web"
      username: "xnat-web"
      # No default password. Provide one (or set externalSecret) when
      # cnpg.cluster.enabled, otherwise install fails fast instead of generating
      # a Secret with a known password.
      password: ""
    # CNPG can include roles and services in cluster definitions.
    # See the official docs for more information
    # https://cloudnative-pg.io/docs/1.29/cloudnative-pg.v1#managedconfiguration
    managed: {}  
  external:
    # Set only one of PostgresqlUri or postgresqlIp
    postgresqlUri: null
    postgresqlIp: null
    postgresqlPort: null

# TCP-socket probes against the http (8080) port; see statefulset.yaml for why
# a socket check rather than an HTTP GET on a version-specific health path.
probes:
  startup:
    # XNAT boots slowly (plugin scan + Hibernate schema migration). 60 * 10s =
    # 10 min of grace before liveness can fire; raise for plugin-heavy sites.
    failureThreshold: 60
    periodSeconds: 10
    timeoutSeconds: 5
  liveness:
    failureThreshold: 12
    periodSeconds: 60
    timeoutSeconds: 10
  readiness:
    failureThreshold: 10
    periodSeconds: 30
    timeoutSeconds: 10
restore: false
backups:
  backupStorageAccount:
  dbdmstoken:
  arcdmstoken:
#Used for any variables that change between cloud services
serviceProvider:
 name:
#  backupMount: archive
