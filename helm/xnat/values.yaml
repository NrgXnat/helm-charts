# Default values for xnat.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
mail:
  enabled: false # Set to true to deploy bundled postfix relay
  existingSecret: postfix-password
  config:
    general:
      ALLOWED_SENDER_DOMAINS: "xnat.org"
      RELAYHOST: "smtp.myrelay.net:587"
      RELAYHOST_USERNAME: apikey
      #RELAYHOST_PASSWORD: ${RELAYHOST_PASSWORD}
      MASQUERADED_DOMAINS: "xnat.org"

# In order to use the following activemq section you must install the Ark-MQ broker found at
# https://github.com/arkmq-org/activemq-artemis-operator/blob/main/docs/getting-started/quick-start.md
# You must set one of either broker.password or existingSecret
activemq:
  broker:
    enabled: false
    user: admin
    # No default password. Set this (or activemq.existingSecret) when the broker
    # is enabled, otherwise install fails fast instead of shipping a known one.
    password: ""
    port: 62626
    # Passed directly to the broker. See the official documentation for arguments that can be placed here.
    deploymentPlan:
      requireLogin: true

  existingSecret:
    name: ""
    key: ""

replicaCount: 1

image:
  repository: xnatworks/xnat-web
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.9.2.1"
imagePullPolicy: IfNotPresent

imagePullSecrets: null

nameOverride: ""
fullnameOverride: ""

# XNAT core does not consume Redis (it uses an on-heap Hibernate L2 cache, and
# no template wires a Redis host/port into XNAT's config). The legacy Ansible
# deploy also ran with this off. Left here, off by default, as an optional
# dependency for setups that wire Redis themselves; enabling it otherwise just
# schedules an unused pod (and pulls a Bitnami image subject to the public
# registry's deprecation).
redis:
  enabled: false
  pullPolicy: IfNotPresent
  master:
    masterCount: 1
    persistence:
      enabled: false
  replica:
    replicaCount: 0
    persistence:
      enabled: false

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Mount the SA token into the pod. null = mount only when containerService is
  # enabled (the only feature that calls the Kubernetes API); set true/false to
  # force it. XNAT itself does not need the token.
  automountServiceAccountToken: null
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# fsGroup makes the kubelet chown mounted volumes to this GID so the non-root
# tomcat user (1000) can write to dynamically provisioned PVCs; OnRootMismatch
# skips the recursive walk once the top-level GID already matches. Without it,
# gp3/EFS volumes mount root:root and XNAT can't create its prearchive lock
# tree, so DICOM imports fail with a misleading "unable to read DICOM object".
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# Applied to the main xnat (Tomcat) container. XNAT needs no Linux
# capabilities, so drop them all. readOnlyRootFilesystem is intentionally left
# off: XNAT writes under /usr/local/tomcat and /data/xnat at runtime.
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  # readOnlyRootFilesystem: true

service:
  port: 80
  type: ClusterIP

ingress:
  enabled: false
  annotations: {}
