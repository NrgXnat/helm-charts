hostAliases: null

# XNAT is a memory-hungry Tomcat app. These requests give the pod a Burstable
# QoS instead of the previous empty {} (BestEffort, first to be evicted under
# node pressure and which makes the memory-based HPA below a no-op). The legacy
# Ansible deploy requested cpu 4 / memory 16Gi with no limit; match or raise
# that for production by overriding here. If you set a memory *limit*, also set
# jvm.maxHeap below it (see the jvm block) so the JVM isn't OOMKilled.
resources:
  requests:
    cpu: 500m
    memory: 2Gi
  # limits:
  #   cpu: "4"
  #   memory: 16Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# PodDisruptionBudget for the XNAT StatefulSet. Off by default and, even when
# enabled, only rendered when the workload can run >= 2 pods (replicaCount >= 2
# or autoscaling on) so a single-replica install never blocks node drains.
# Prefer maxUnavailable; set minAvailable only for real HA and never >= the
# replica count (it would deadlock voluntary evictions / node consolidation).
podDisruptionBudget:
  enabled: false
  maxUnavailable: 1
  minAvailable: ""

# Heap/metaspace sizing injected via JAVA_TOOL_OPTIONS. Off by default, leaving
# the image's built-in JVM ergonomics in place (parity with the legacy Ansible
# deploy, which set no heap). Turn on and set maxHeap when you pin a memory
# limit under `resources`, keeping maxHeap below the limit with headroom for
# metaspace, threads and direct buffers.
jvm:
  enabled: false
  minHeap: ""        # -Xms, e.g. "8g"
  maxHeap: ""        # -Xmx, e.g. "12g"
  maxMetaspace: ""   # -XX:MaxMetaspaceSize, e.g. "1g" (plugin-heavy XNAT needs room)
  extraOpts: ""      # appended verbatim to JAVA_TOOL_OPTIONS

# Graceful shutdown. The preStop sleep lets the load balancer deregister the
# pod before Tomcat receives SIGTERM, so in-flight requests aren't dropped on
# rollout or node drain; terminationGracePeriodSeconds must exceed the sleep.
# Set lifecycle: {} to disable the hook.
terminationGracePeriodSeconds: 90
lifecycle:
  preStop:
    exec:
      command: ["sh", "-c", "sleep 20"]

# Prometheus metrics. XNAT/Tomcat exposes no native /metrics, so JVM and Tomcat
# MBeans are surfaced via the standard Prometheus JMX java agent. Everything
# here is additive and off by default.
metrics:
  jmx:
    enabled: false
    # The agent serves unauthenticated, unencrypted metrics on this port (bound
    # to all interfaces). It is added only to the in-cluster ClusterIP Service,
    # never the Ingress; restrict scrape access with a NetworkPolicy admitting
    # only your Prometheus.
    port: 9404
    # Image containing the jmx_prometheus_javaagent jar; an init container
    # copies the jar out of it into a shared volume. No default (the agent has
    # no single canonical image), so this is required when metrics.jmx.enabled
    # is true. The jar is loaded in-process by the XNAT JVM, so prefer a
    # digest-pinned image from a registry you trust (e.g. an org mirror).
    image: ""
    # Path to the agent jar inside metrics.jmx.image. Verify for your image,
    # e.g. `docker run --rm <image> find / -name 'jmx_prometheus_javaagent*.jar'`.
    agentJarPath: "/opt/jmx_exporter/jmx_prometheus_javaagent.jar"
    resources: {}
    # JMX rules rendered into a ConfigMap and read by the agent.
    # whitelistObjectNames bounds cardinality by querying only core JVM and
    # Tomcat MBeans; a bare rules: [".*"] with no whitelist exports every MBean
    # in the JVM (often 1000+ series per pod) and can overwhelm Prometheus.
    # Widen the whitelist for more coverage.
    config:
      lowercaseOutputName: true
      lowercaseOutputLabelNames: true
      whitelistObjectNames:
        - "java.lang:*"
        - "Catalina:type=GlobalRequestProcessor,name=*"
        - "Catalina:type=ThreadPool,name=*"
      rules:
        - pattern: ".*"
  # Emit a Prometheus Operator ServiceMonitor scraping metrics.jmx.port.
  # Requires metrics.jmx.enabled (nothing exposes metrics otherwise) and the
  # monitoring.coreos.com CRDs to be present on the cluster.
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

nodeSelector: {}

# -- use this to specify a single node on which to run XNAT in host network mode
nodeName:

tolerations: []

affinity: {}


persistence: {}
