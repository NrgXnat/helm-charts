{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "xnat.serviceAccountName" . }}
  labels:
    {{- include "xnat.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ if kindIs "bool" .Values.serviceAccount.automountServiceAccountToken }}{{ .Values.serviceAccount.automountServiceAccountToken }}{{ else }}{{ .Values.containerService }}{{ end }}
{{- end }}
