apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "xnat.fullname" . }}
  labels:
    {{- include "xnat.labels" . | nindent 4 }}
spec:
  {{- if .Values.nodeName }}
  replicas: 1
  {{- else if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "xnat.statefulsetLabels" . | nindent 6 }}
  serviceName: {{ include "xnat.fullname" . }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "xnat.statefulsetLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{ if .Values.hostAliases }}
      hostAliases:
      {{- range $value, $v := .Values.hostAliases }}
      - hostnames:
        - {{ $v.hostname }}
        ip: {{ $v.ip }}
      {{- end }}
      {{- end }}
      serviceAccountName: {{ include "xnat.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.nodeName }}
      hostNetwork: true
      nodeName: {{ .Values.nodeName }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- if or .Values.jvm.enabled .Values.metrics.jmx.enabled }}
          env:
            # JAVA_TOOL_OPTIONS is honoured by every JVM regardless of the
            # image's launcher, so heap sizing (jvm.*) and the Prometheus JMX
            # java agent (metrics.jmx) work without knowing whether xnat-web
            # reads JAVA_OPTS or CATALINA_OPTS. The JVM logs a one-line
            # "Picked up JAVA_TOOL_OPTIONS:" notice to stderr.
            - name: JAVA_TOOL_OPTIONS
              value: {{ include "xnat.javaToolOptions" . | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.metrics.jmx.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.jmx.port }}
              protocol: TCP
            {{- end }}
          # Probes use a TCP socket on the http port rather than an HTTP GET:
          # XNAT's health path varies by version and the old default
          # (/app/template/Login.vm#!) 404s on current xnat-web, while the #!
          # fragment is never sent server-side. "Is Tomcat accepting on 8080?"
          # is the version-agnostic readiness signal.
          livenessProbe:
            tcpSocket:
              port: http
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          readinessProbe:
            tcpSocket:
              port: http
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: passwd
              mountPath: /etc/passwd
              readOnly: true
              subPath: passwd
            - name: tomcat
              mountPath: /usr/local/tomcat
            - name: conf-catalina
              mountPath: /usr/local/tomcat/conf/Catalina
            - name: xnat-home
              mountPath: /data/xnat/home
            - name: home-plugins
              mountPath: /data/xnat/home/plugins
            {{- if .Values.metrics.jmx.enabled }}
            - name: jmx-agent
              mountPath: /jmx
              readOnly: true
            - name: jmx-config
              mountPath: /etc/jmx
              readOnly: true
            {{- end }}
            {{- range $plugin, $p := .Values.authplugins }}
            {{- if .auth }}
            - name: auth-{{ $p.provider }}
              mountPath: /data/xnat/home/config/auth/{{ $p.provider }}-provider.properties
              readOnly: true
              subPath: {{ $p.provider }}-provider.properties
            {{- end }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- . | toYaml | nindent 12 }}
            {{- end }}
            {{- range $name, $c := .Values.persistence }}
            {{- if $c.size }}
            - mountPath: {{ $c.mountPath | quote }}
              name: {{ $name | quote }}
            {{- end }}
            {{- end }}
            {{- range $name, $c := .Values.volumes }}
            {{- if $c.size }}
            - mountPath: {{ $c.mountPath | quote }}
              name: {{ $name | quote }}
              {{- if $c.mountPropagation }}
              mountPropagation: {{$c.mountPropagation|default "None"|quote}}
              {{- end }}
            {{- end }}
            {{- end }}
      initContainers:
        {{- if .Values.metrics.jmx.enabled }}
        - name: jmx-agent
          image: {{ required "metrics.jmx.image is required when metrics.jmx.enabled (it must contain the Prometheus jmx_prometheus_javaagent jar)" .Values.metrics.jmx.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["sh", "-c", "cp {{ .Values.metrics.jmx.agentJarPath }} /jmx/agent.jar"]
          {{- with .Values.metrics.jmx.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: jmx-agent
              mountPath: /jmx
        {{- end }}
        {{- range $plugin, $c := .Values.plugins }}
        - name: {{ $plugin }}
          image: "{{ $c.repository }}:{{ $c.tag }}"
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          volumeMounts:
            - name: home-plugins
              mountPath: /data/xnat/home/plugins
        {{- end }}
        {{- if .Values.activemq.broker.enabled }}
        - name: wait-for-amq
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - |
              echo "Waiting for ActiveMQ broker to be ready..."
              until nc -z activemq-artemis-{{ template "xnat.fullname" . }}-0-svc {{ .Values.activemq.broker.port }}; do
                echo "ActiveMQ broker not ready yet, waiting..."
                sleep 5
              done
              echo "ActiveMQ broker is ready!"
        {{- end }}
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - |
              echo "Waiting for Postgres to be ready"
              until nc -z {{ template "xnat.postgresql.postgresqlUri" . }} {{ template "xnat.postgresql.postgresqlPort" . }}; do
                echo "Postgres not ready yet, waiting..."
                sleep 5
              done
              echo "Postgres is ready!"
        {{- if .Values.initContainers }}
        {{- with .Values.initContainers }}
        {{- . | toYaml | nindent 8 }}
        {{- end }}
        {{- end }}
        - name: home-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - 'bash'
            - '-c'
            - |
              set -x
              shopt -s extglob
              # Copy Tomcat folder
              [ -d /TOMCAT ] && cp -r --preserve=mode,timestamps /usr/local/tomcat/* /TOMCAT
              chown -R {{ default "1000" .Values.securityContext.runAsUser }} /TOMCAT
              # Setup xnat-conf.properties
              readarray -d - -t REP <<< "${POD_NAME}"
              cp /tmp/xnat-conf.properties ${XNAT_HOME}/config/xnat-conf.properties
              # Guarantee a trailing newline before appending: without it the
              # echo below glues xnat.is_primary_node onto the last property of
              # the source file (e.g. "...=truexnat.is_primary_node=true"),
              # which Spring then fails to parse and the webapp never deploys.
              [ "$(tail -c 1 ${XNAT_HOME}/config/xnat-conf.properties)" = "" ] || echo "" >> ${XNAT_HOME}/config/xnat-conf.properties
              {{- if .Values.cnpg.cluster.credentials.externalSecret }}
              # Datasource password is sourced at runtime from the external
              # secret (via XNAT_DB_PASSWORD) so it stays out of the rendered
              # config Secret. Everything that touches the password runs inside
              # the { set +x; } window so the script's top-level `set -x` does
              # not echo it to the pod log; do not reference XNAT_DB_PASSWORD
              # after `set -x` resumes. printf %s handles any special chars.
              { set +x; } 2>/dev/null
              if [ -z "${XNAT_DB_PASSWORD}" ]; then
                echo "ERROR: externalSecret {{ .Values.cnpg.cluster.credentials.externalSecret }} key {{ .Values.cnpg.cluster.credentials.externalSecretPasswordKey | default "password" }} is empty or missing" >&2
                exit 1
              fi
              printf 'datasource.password=%s\n' "${XNAT_DB_PASSWORD}" >> ${XNAT_HOME}/config/xnat-conf.properties
              set -x
              {{- end }}
              if [[ "${REP[-1]}" -eq "0" ]]; then
                echo "xnat.is_primary_node=true" >> ${XNAT_HOME}/config/xnat-conf.properties
              else
                echo "xnat.is_primary_node=false" >> ${XNAT_HOME}/config/xnat-conf.properties
              fi
              echo "node.id=$(hostname)" > ${XNAT_HOME}/config/node-conf.properties
              # Copy XNAT_HOME directory excluding the plugins folder
              cp -r --preserve=mode,timestamps ${XNAT_HOME}/!(plugins) /XNAT_HOME
              chown -R {{ default "1000" .Values.securityContext.runAsUser }} /XNAT_HOME
              chown -R {{ default "1000" .Values.securityContext.runAsUser }} /HOME-PLUGINS
          env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name           
          {{- if .Values.cnpg.cluster.credentials.externalSecret }}
          - name: XNAT_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.cnpg.cluster.credentials.externalSecret }}
                key: {{ .Values.cnpg.cluster.credentials.externalSecretPasswordKey | default "password" }}
          {{- end }}
          volumeMounts:
            - name: tomcat
              mountPath: /TOMCAT
            - name: xnat-home
              mountPath: /XNAT_HOME
            - name: home-plugins
              mountPath: /HOME-PLUGINS
            - name: xnat-config
              mountPath: /tmp/xnat-conf.properties
              readOnly: true
              subPath: xnat-conf.properties

      volumes:
        - name: passwd
          configMap:
            name: {{ include "xnat.fullname" . }}
            items:
              - key: passwd
                path: passwd
        - name: tomcat
          emptyDir: {}
        # SEVERE: Unable to create directory for deployment: [/usr/local/tomcat/conf/Catalina/localhost]
        - name: conf-catalina
          emptyDir: {}
        - name: xnat-home
          emptyDir: {}
        - name: home-plugins
          emptyDir: {}
        {{- if .Values.metrics.jmx.enabled }}
        - name: jmx-agent
          emptyDir: {}
        - name: jmx-config
          configMap:
            name: {{ include "xnat.fullname" . }}-jmx
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- . | toYaml | nindent 8 }}
        {{- end }}
        {{- range $plugin, $p := .Values.authplugins }}
        {{- if $p.auth }}
        - name: auth-{{ $p.provider }}
          secret:
            secretName: xnat-plugin-{{ $plugin }}
            items:
              - key: {{ $p.provider }}-provider-properties
                path: {{ $p.provider }}-provider.properties
        {{- end }}
        {{- end }}
        - name: xnat-config
          secret:
            secretName: {{ include "xnat.fullname" . }}
        {{- $context := . -}}
        {{- range $name, $c := .Values.volumes }}
        {{- if $c.size }}
        - name: {{ $name }}
          persistentVolumeClaim:
            claimName: {{ $c.existingClaim | default (printf "%s-%s" (include "xnat.fullname" $context) $name) }}
        {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    {{- range $name, $c := .Values.persistence }}
    {{- if not $c.existingClaim }}
    {{- if $c.size }}
    - metadata:
        name: {{ $name | quote }}
      spec:
        accessModes: [ {{ $c.accessMode | quote }} ]
        {{- if (or $c.storageClass $.Values.global.storageClass) }}
        storageClassName: {{ $c.storageClass | default $.Values.global.storageClass | quote }}
        {{- end }}
        volumeMode: Filesystem
        resources:
          requests:
            storage: {{ $c.size }}
    {{- end }}
    {{- end }}
    {{- end }}
