{{- if .Values.cnpg.cluster.enabled }}
{{- if not .Values.cnpg.cluster.credentials.externalSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-app-credentials" (include "xnat.postgresql.clusterName" .) }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.cnpg.cluster.credentials.username }}
  password: {{ required "cnpg.cluster.credentials.password is required when cnpg.cluster is enabled without an externalSecret" .Values.cnpg.cluster.credentials.password }}
{{- end }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "xnat.postgresql.clusterName" . }}
  annotations:
    checksum/cnpg-values: {{ .Values.cnpg | toJson | sha256sum }}
spec:
  {{- if or .Values.cnpg.cluster.affinity .Values.cnpg.cluster.nodeSelector .Values.cnpg.cluster.tolerations }}
  affinity:
    {{- with .Values.cnpg.cluster.affinity }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.cnpg.cluster.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.cnpg.cluster.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  instances: {{ .Values.cnpg.cluster.instances }}
  imageName: ghcr.io/cloudnative-pg/postgresql:{{ .Values.cnpg.cluster.version }}
  storage:
    size: {{ .Values.cnpg.cluster.storage.size }}
    {{- with .Values.cnpg.cluster.storage.storageClass }}
    storageClass: {{ . }}
    {{- end }}
  resources: {{- .Values.cnpg.cluster.resources | toYaml | nindent 4 }}
  enableSuperuserAccess: {{ .Values.cnpg.cluster.enableSuperuserAccess }}
  bootstrap:
    initdb:
      database: {{ .Values.cnpg.cluster.credentials.database }}
      owner: {{ .Values.cnpg.cluster.credentials.username }}
      secret:
        {{- if .Values.cnpg.cluster.credentials.externalSecret }}
        name: {{ .Values.cnpg.cluster.credentials.externalSecret }}
        {{- else }}
        name: {{ printf "%s-app-credentials" (include "xnat.postgresql.clusterName" .) }}
        {{- end }}
  postgresql:
    parameters: {{- .Values.cnpg.cluster.parameters | toYaml | nindent 6 }}
  {{- if .Values.cnpg.cluster.managed }}
  managed: {{- .Values.cnpg.cluster.managed | toYaml | nindent 4 }}
  {{- end }}
{{- end }}
