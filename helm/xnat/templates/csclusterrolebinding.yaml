{{- if .Values.containerService }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "xnat.fullname" . }}-cs-ready
  labels:
    {{- include "xnat.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "xnat.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "xnat.fullname" . }}-cs-ready
  apiGroup: rbac.authorization.k8s.io
{{- end }}