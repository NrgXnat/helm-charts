{{- if not .Values.cnpg.cluster.enabled }}
{{- if .Values.cnpg.external.postgresqlUri }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xnat.postgresql.fullname" . }}
  labels:
{{- include "xnat.labels" . | nindent 4 }}
spec:
  type: ExternalName
  externalName: {{ .Values.cnpg.external.postgresqlUri }}
  # An ExternalName Service with no ports is silently dropped by the API
  # server (the apply succeeds but the object is never created), so XNAT's
  # JDBC lookup of <release>-postgres-rw fails. Emit the port explicitly.
  ports:
    {{- include "xnat.postgresql.servicePorts" . | nindent 4 }}
{{- else if .Values.cnpg.external.postgresqlIp }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xnat.postgresql.fullname" . }}
  labels:
{{- include "xnat.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    {{- include "xnat.postgresql.servicePorts" . | nindent 4 }}
---
apiVersion: v1
kind: EndpointSlice
metadata:
  name: {{ include "xnat.postgresql.fullname" . }}
  labels:
{{- include "xnat.labels" . | nindent 4 }}
    kubernetes.io/service-name: {{ include "xnat.postgresql.fullname" . }}
addressType: IPv4
endpoints:
  - addresses:
      - "{{ .Values.cnpg.external.postgresqlIp }}"
ports:
  - port: {{ include "xnat.postgresql.postgresqlPort" . }}
    protocol: TCP
{{- end }}
{{- end }}
