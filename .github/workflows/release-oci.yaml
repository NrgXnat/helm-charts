name: release-oci

# Publish each chart under helm/ to GHCR as an OCI artifact when its version
# changes on main. Consume with (Helm 3.8+):
#   helm install <release> oci://ghcr.io/<owner>/charts/<chart> --version <ver>
#
# First-time setup (one-off, by a repo admin):
#   - After the first publish, set the GitHub Package visibility to Public and
#     link it to this repository (Packages settings), so consumers can pull
#     without authentication.
on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push changed charts
        run: |
          set -euo pipefail
          # GHCR repository paths must be lowercase.
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          registry="oci://ghcr.io/${owner}/charts"
          mkdir -p dist
          for chart in helm/*/; do
            [ -f "${chart}Chart.yaml" ] || continue
            name=$(helm show chart "$chart" | awk '/^name:/{print $2; exit}')
            version=$(helm show chart "$chart" | awk '/^version:/{print $2; exit}')
            if helm show chart "${registry}/${name}" --version "$version" >/dev/null 2>&1; then
              echo "${name} ${version} already published; skipping"
              continue
            fi
            echo "Publishing ${name} ${version} to ${registry}"
            helm package "$chart" -d dist/
            helm push "dist/${name}-${version}.tgz" "$registry"
          done
